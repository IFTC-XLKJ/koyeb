<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开始使用</title>
    <link rel="shortcut icon" href="/static/yate.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/docs/docs.css">
    <link rel="stylesheet" href="/static/highlight.min.css">
    <script src="/static/highlight.min.js"></script>
</head>

<body>
    <div id="app">
        <h1 id="title">开始使用</h1><!-- title -->
        <div id="content"><!-- content -->
            <p>欢迎来到 Yate！这是一个简单的指南，帮助你快速上手。</p>
            <p>Yate 是一个现代化的前端开发框架，旨在简化 Web 应用的开发过程。</p>
            <h2>安装</h2>
            <p>你可以通过以下命令安装 Yate：</p>
            <pre><code class="language-bash">npm install yate</code></pre>
            <h2>创建项目</h2>
            <p>使用以下命令创建一个新的 Yate 项目：</p>
            <pre><code class="language-bash">yate create my-project</code></pre>
            <h2>运行项目</h2>
            <p>进入项目目录并运行：</p>
            <pre><code class="language-bash">cd my-project
yate dev</code></pre>
            <p>现在你可以在浏览器中访问 <a href="http://localhost:3000">http://localhost:3000</a> 来查看你的项目了！</p>
        </div>
    </div>
</body>

</html>
