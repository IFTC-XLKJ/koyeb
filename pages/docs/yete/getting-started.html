    <div id="app">
        <h1 id="title">开始使用</h1><!-- title -->
        <div id="content"><!-- content -->
            <p>欢迎来到 Yete！这是一个简单的指南，帮助你快速上手。</p>
            <p>Yete 是一个现代化的前端开发框架，旨在简化 Web 应用的开发过程。</p>
            <h2>安装</h2>
            <p>Yete CLI: </p>
            <p>&nbsp;&nbsp;&nbsp;&nbsp;
                <a
                    href="https://dbmp-xbgmorqeur6oh81z.database.nocode.cn/storage/v1/object/public/files/yete-win-x64.exe">Windows
                    x64</a>
            </p>
            <h2>创建项目</h2>
            <p>使用 Yete CLI 创建一个新的项目：</p>
            <p>通过 <code>chcp 65001</code> 命令设置控制台编码为 UTF-8。</p>
            <pre><code class="language-bash">yete init my-project</code></pre>
            <h2>运行开发服务器</h2>
            <p>进入项目目录并启动开发服务器：</p>
            <pre><code class="language-bash">cd my-project
yete serve</code></pre>
            <p>打开浏览器访问 <a href="http://localhost:3000">http://localhost:3000</a>，你应该能看到你的应用正在运行！</p>
        </div>
    </div>
